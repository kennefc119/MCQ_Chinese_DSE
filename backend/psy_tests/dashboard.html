<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>心理測驗 Admin Dashboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0d1117;
      --surface:  #161b22;
      --surface2: #21262d;
      --surface3: #30363d;
      --border:   #30363d;
      --text:     #e6edf3;
      --muted:    #8b949e;
      --dim:      #6e7681;
      --accent:   #58a6ff;
      --accent2:  #79b8ff;
      --green:    #3fb950;
      --yellow:   #d29922;
      --orange:   #fb8f44;
      --red:      #f85149;
      --purple:   #bc8cff;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* ── Sidebar ─────────────────────────────────────────────────────────── */
    .sidebar {
      width: 290px;
      min-width: 290px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }

    .sidebar-logo {
      padding: 18px 16px 14px;
      border-bottom: 1px solid var(--border);
    }
    .sidebar-logo h1 { font-size: 15px; font-weight: 700; }
    .sidebar-logo .sub { font-size: 11px; color: var(--muted); margin-top: 2px; }

    .conn-pill {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      margin-top: 8px;
      padding: 3px 9px;
      border-radius: 20px;
      background: var(--surface2);
      color: var(--muted);
    }
    .conn-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--dim); }
    .conn-pill.ok .conn-dot  { background: var(--green); }
    .conn-pill.ok            { color: var(--green); }
    .conn-pill.err .conn-dot { background: var(--red); }
    .conn-pill.err           { color: var(--red); }

    .s-section {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
    }
    .s-section h3 {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--muted);
      margin-bottom: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .form-group { margin-bottom: 10px; }
    .form-group label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 4px; }

    input[type="text"], input[type="password"], input[type="number"], select, textarea {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      padding: 7px 9px;
      font-size: 13px;
      outline: none;
    }
    input[type="text"]:focus,
    input[type="password"]:focus,
    input[type="number"]:focus,
    select:focus,
    textarea:focus { border-color: var(--accent); }
    select { cursor: pointer; }
    textarea { resize: vertical; font-family: inherit; }

    .btn-gen {
      width: 100%;
      padding: 11px;
      background: var(--accent);
      color: #0d1117;
      font-weight: 700;
      font-size: 14px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      transition: background .15s, opacity .15s;
      margin-top: 4px;
    }
    .btn-gen:hover:not(:disabled) { background: var(--accent2); }
    .btn-gen:disabled { opacity: .5; cursor: not-allowed; }

    .btn-push {
      width: 100%;
      padding: 11px;
      background: var(--green);
      color: #0d1117;
      font-weight: 700;
      font-size: 14px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      transition: background .15s, opacity .15s;
      margin-top: 8px;
    }
    .btn-push:hover:not(:disabled) { background: #56d364; }
    .btn-push:disabled { opacity: .5; cursor: not-allowed; }

    .btn-sm {
      padding: 3px 8px;
      font-size: 11px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 5px;
      color: var(--muted);
      cursor: pointer;
    }
    .btn-sm:hover { color: var(--text); border-color: var(--muted); }

    .btn-danger {
      padding: 3px 8px;
      font-size: 11px;
      background: rgba(248,81,73,.1);
      border: 1px solid rgba(248,81,73,.3);
      border-radius: 5px;
      color: var(--red);
      cursor: pointer;
    }
    .btn-danger:hover { background: rgba(248,81,73,.2); }

    .spin {
      width: 14px; height: 14px;
      border: 2px solid rgba(0,0,0,.25);
      border-top-color: #0d1117;
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .spin-light {
      width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,.2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .7s linear infinite;
      display: inline-block;
    }

    /* ── Sidebar test list ───────────────────────────────────────────────── */
    .test-item {
      padding: 7px 0;
      border-bottom: 1px solid var(--border);
      font-size: 12px;
    }
    .test-item:last-child { border-bottom: none; }
    .test-item .t-title { color: var(--text); font-weight: 500; }
    .test-item .t-meta { color: var(--dim); font-size: 11px; margin-top: 2px; display: flex; gap: 6px; align-items: center; }
    .active-badge {
      font-size: 10px;
      padding: 1px 6px;
      border-radius: 10px;
      background: rgba(63,185,80,.15);
      color: var(--green);
    }
    .inactive-badge {
      font-size: 10px;
      padding: 1px 6px;
      border-radius: 10px;
      background: var(--surface3);
      color: var(--dim);
    }

    /* ── Main ────────────────────────────────────────────────────────────── */
    .main { flex: 1; overflow-y: auto; display: flex; flex-direction: column; }

    .main-hdr {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 16px 24px 12px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }
    .main-hdr h2 { font-size: 16px; font-weight: 600; }

    .badge {
      background: var(--surface2);
      color: var(--muted);
      font-size: 11px;
      padding: 2px 9px;
      border-radius: 20px;
    }

    /* ── Tabs ────────────────────────────────────────────────────────────── */
    .tabs {
      display: flex;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
    }
    .tab {
      padding: 10px 16px;
      font-size: 13px;
      font-weight: 500;
      color: var(--muted);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: color .12s, border-color .12s;
      user-select: none;
    }
    .tab:hover { color: var(--text); }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

    .tab-content { flex: 1; overflow-y: auto; }
    .tab-panel { display: none; padding: 24px; }
    .tab-panel.on { display: block; }

    /* ── Generate panel ──────────────────────────────────────────────────── */
    .panel-grid {
      display: grid;
      grid-template-columns: 340px 1fr;
      gap: 20px;
      align-items: start;
    }

    .gen-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 18px;
    }
    .gen-card h3 {
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--muted);
      margin-bottom: 14px;
    }

    .slider-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .slider-row input[type="range"] {
      flex: 1;
      background: transparent;
      padding: 0;
      height: auto;
      cursor: pointer;
      accent-color: var(--accent);
    }
    .slider-val {
      min-width: 28px;
      text-align: right;
      font-size: 13px;
      font-weight: 700;
      color: var(--accent);
    }

    /* JSON output area */
    .json-area {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }
    .json-area-hdr {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
    }
    .json-area-hdr span { font-size: 12px; font-weight: 600; color: var(--muted); }

    textarea.json-ta {
      width: 100%;
      min-height: 480px;
      background: var(--bg);
      border: none;
      border-radius: 0;
      color: #e6edf3;
      padding: 14px;
      font-family: "Cascadia Code", "Fira Code", Consolas, "Courier New", monospace;
      font-size: 12px;
      line-height: 1.6;
      resize: vertical;
      outline: none;
    }

    /* Loading card */
    .loading-card {
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 40px 32px;
      text-align: center;
      display: none;
    }
    .loading-bar { height: 3px; background: var(--surface2); border-radius: 2px; overflow: hidden; margin-top: 16px; }
    .loading-fill { height: 100%; background: var(--accent); width: 30%; border-radius: 2px; animation: lslide 1.4s ease-in-out infinite; }
    @keyframes lslide { 0% { margin-left: -30%; } 100% { margin-left: 100%; } }

    /* ── Manage panel ────────────────────────────────────────────────────── */
    .tests-table-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }
    .tests-table-wrap table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .tests-table-wrap th, .tests-table-wrap td { padding: 10px 14px; text-align: left; }
    .tests-table-wrap thead tr { background: var(--surface2); }
    .tests-table-wrap th { color: var(--muted); font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: .06em; }
    .tests-table-wrap tbody tr { border-top: 1px solid var(--border); }
    .tests-table-wrap tbody tr:hover { background: var(--surface2); }
    .tests-table-wrap .actions { display: flex; gap: 6px; align-items: center; }

    .chip {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 20px;
      font-weight: 500;
    }
    .c-green  { background: rgba(63,185,80,.15);  color: #3fb950; }
    .c-dim    { background: var(--surface2);      color: var(--dim); }
    .c-blue   { background: rgba(88,166,255,.15); color: #58a6ff; }
    .c-yellow { background: rgba(210,153,34,.15); color: #d29922; }

    .empty-state {
      border: 1px dashed var(--border);
      border-radius: 12px;
      padding: 60px 40px;
      text-align: center;
      color: var(--muted);
    }
    .empty-state .ico { font-size: 40px; margin-bottom: 12px; }
    .empty-state p { font-size: 13px; line-height: 1.8; }

    /* ── Toast ───────────────────────────────────────────────────────────── */
    #toast-wrap {
      position: fixed;
      top: 16px;
      right: 16px;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      gap: 8px;
      pointer-events: none;
    }
    .toast {
      padding: 11px 16px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 8px;
      max-width: 340px;
      pointer-events: auto;
      animation: slideIn .25s ease;
      box-shadow: 0 4px 12px rgba(0,0,0,.4);
    }
    .toast.success { background: rgba(63,185,80,.2); border: 1px solid rgba(63,185,80,.4); color: #3fb950; }
    .toast.error   { background: rgba(248,81,73,.2); border: 1px solid rgba(248,81,73,.4); color: #f85149; }
    .toast.info    { background: rgba(88,166,255,.2); border: 1px solid rgba(88,166,255,.4); color: #58a6ff; }
    @keyframes slideIn { from { transform: translateX(110%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    @keyframes slideOut { from { transform: translateX(0); opacity: 1; } to { transform: translateX(110%); opacity: 0; } }
    .toast.out { animation: slideOut .25s ease forwards; }

    /* misc */
    .section-hdr {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }
    .section-hdr h3 { font-size: 14px; font-weight: 600; }

    code {
      background: var(--surface2);
      padding: 1px 6px;
      border-radius: 3px;
      color: var(--accent);
      font-size: 12px;
      font-family: "Cascadia Code", Consolas, monospace;
    }
  </style>
</head>
<body>

<!-- ── SIDEBAR ────────────────────────────────────────────────────────────── -->
<aside class="sidebar">
  <div class="sidebar-logo">
    <h1>🧠 心理測驗 Admin</h1>
    <div class="sub">DSE 心理測驗生成系統</div>
    <div class="conn-pill" id="connPill">
      <span class="conn-dot"></span>
      <span id="connTxt">連接中...</span>
    </div>
  </div>

  <!-- Config -->
  <div class="s-section">
    <h3>Bot 設定</h3>

    <div class="form-group">
      <label>PSY Bot 名稱</label>
      <input type="text" id="cfgBotName" value="GPT-5.4-Mini" autocomplete="off">
    </div>

    <button class="btn-sm" onclick="saveConfig()" style="width:100%;margin-top:4px;">
      💾 儲存設定
    </button>
  </div>

  <!-- Existing tests -->
  <div class="s-section" style="flex:1;border-bottom:none;">
    <h3>
      現有測驗
      <button class="btn-sm" onclick="refreshTestList()" id="refreshListBtn">🔄</button>
    </h3>
    <div id="sidebarTests">
      <div style="color:var(--dim);font-size:11px;">載入中...</div>
    </div>
  </div>
</aside>

<!-- ── MAIN ───────────────────────────────────────────────────────────────── -->
<div class="main">
  <div class="main-hdr">
    <h2>🧪 心理測驗生成系統</h2>
    <span class="badge" id="testCountBadge">0 個測驗</span>
  </div>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('generate', this)">✨ 生成測驗</div>
    <div class="tab" onclick="switchTab('manage', this)">📋 測驗管理</div>
  </div>

  <div class="tab-content">

    <!-- ── Tab: Generate ──────────────────────────────────────────────────── -->
    <div class="tab-panel on" id="tab-generate">
      <div class="panel-grid">

        <!-- Left: controls -->
        <div>
          <div class="gen-card">
            <h3>測驗設定</h3>

            <div class="form-group">
              <label>測驗方向提示 <span style="color:var(--dim);font-size:10px;">(直接傳給 AI 生成器)</span></label>
              <textarea id="testHint" rows="6" placeholder="e.g. 探索DSE學生的壓力管理風格，分4種類型：行動派、分析派、逃避派、求助派。&#10;&#10;或：將學生配對到香港文學中的古典角色，如林黛玉、賈寶玉等。&#10;&#10;或：了解學生備考時的決策模式與應對方式。"></textarea>
            </div>

            <div class="form-group">
              <label>問題數量 <span style="color:var(--dim);font-size:10px;">(5–100)</span></label>
              <div class="slider-row">
                <input type="range" id="questionCount" min="5" max="100" value="10"
                  oninput="document.getElementById('qcVal').textContent=this.value">
                <span class="slider-val" id="qcVal">10</span>
              </div>
            </div>

            <div class="form-group">
              <label>結果類型數量 <span style="color:var(--dim);font-size:10px;">(3–100)</span></label>
              <div class="slider-row">
                <input type="range" id="resultCount" min="3" max="100" value="5"
                  oninput="document.getElementById('rcVal').textContent=this.value">
                <span class="slider-val" id="rcVal">5</span>
              </div>
            </div>

            <button class="btn-gen" id="genBtn" onclick="generate()">
              <span id="genBtnIco">✨</span>
              <span id="genBtnTxt">生成測驗</span>
            </button>
          </div>
        </div>

        <!-- Right: output -->
        <div>
          <div class="loading-card" id="loadCard">
            <div style="font-size:32px;">🤖</div>
            <div style="font-size:14px;color:var(--muted);margin-top:8px;">正在生成測驗，請稍候...</div>
            <div style="font-size:12px;color:var(--dim);margin-top:4px;">通常需要 20–60 秒</div>
            <div class="loading-bar"><div class="loading-fill"></div></div>
          </div>

          <div class="json-area" id="jsonArea" style="display:none;">
            <div class="json-area-hdr">
              <span>📄 生成的測驗 JSON</span>
              <div style="display:flex;gap:6px;">
                <button class="btn-sm" onclick="copyJson()">📋 複製</button>
                <button class="btn-sm" onclick="formatJson()">🔧 格式化</button>
              </div>
            </div>
            <textarea class="json-ta" id="jsonOutput" spellcheck="false"></textarea>
            <div style="padding:12px 14px;border-top:1px solid var(--border);background:var(--surface);">
              <button class="btn-push" id="pushBtn" onclick="pushToSupabase()">
                <span id="pushBtnIco">📤</span>
                <span id="pushBtnTxt">推送到 Supabase</span>
              </button>
            </div>
          </div>

          <div class="empty-state" id="genEmpty">
            <div class="ico">🎲</div>
            <p>
              選擇測驗類型並點擊「生成測驗」<br>
              LLM 將會為你生成完整的測驗 JSON<br>
              <span style="font-size:11px;color:var(--dim);">確保 <code>server.py</code> 已在運行，且 Poe API Key 已設定</span>
            </p>
          </div>
        </div>

      </div>
    </div>

    <!-- ── Tab: Manage ────────────────────────────────────────────────────── -->
    <div class="tab-panel" id="tab-manage">
      <div class="section-hdr">
        <h3>所有測驗</h3>
        <div style="display:flex;gap:8px;">
          <button class="btn-sm" onclick="loadManageTests()">🔄 刷新</button>
          <button class="btn-danger" onclick="deleteAllTests()" style="padding:4px 10px;font-size:12px;">🗑 刪除全部</button>
        </div>
      </div>

      <div id="manageLoading" style="text-align:center;padding:40px;color:var(--muted);display:none;">
        <div class="spin-light" style="margin:0 auto 10px;"></div>
        <div>載入中...</div>
      </div>

      <div id="manageContent">
        <div class="empty-state">
          <div class="ico">📋</div>
          <p>點擊「刷新」載入所有測驗</p>
        </div>
      </div>
    </div>

  </div><!-- /tab-content -->
</div><!-- /main -->

<!-- ── TOAST ──────────────────────────────────────────────────────────────── -->
<div id="toast-wrap"></div>

<script>
const API = 'http://127.0.0.1:8766';

// ── Config (localStorage) ─────────────────────────────────────────────────────
function loadConfig() {
  const botName = localStorage.getItem('psy_bot_name') || 'GPT-5.4-Mini';
  document.getElementById('cfgBotName').value = botName;
}

function saveConfig() {
  localStorage.setItem('psy_bot_name', document.getElementById('cfgBotName').value.trim());
  toast('設定已儲存', 'success');
}

// ── Tab switching ─────────────────────────────────────────────────────────────
function switchTab(name, el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('on'));
  el.classList.add('active');
  document.getElementById('tab-' + name).classList.add('on');
  if (name === 'manage') loadManageTests();
}

// ── Health check ──────────────────────────────────────────────────────────────
async function checkHealth() {
  const pill = document.getElementById('connPill');
  const txt  = document.getElementById('connTxt');
  try {
    const r = await fetch(`${API}/api/health`, { signal: AbortSignal.timeout(5000) });
    const d = await r.json();
    if (d.status === 'ok') {
      pill.className = 'conn-pill ok';
      txt.textContent = 'Supabase 已連接';
    } else {
      pill.className = 'conn-pill err';
      txt.textContent = d.detail || '連接錯誤';
    }
  } catch {
    pill.className = 'conn-pill err';
    txt.textContent = '伺服器未連接';
  }
}

// ── Sidebar test list ─────────────────────────────────────────────────────────
async function refreshTestList() {
  const el = document.getElementById('sidebarTests');
  el.innerHTML = '<div style="color:var(--dim);font-size:11px;"><span class="spin-light" style="vertical-align:middle;margin-right:6px;"></span>載入中...</div>';
  try {
    const r = await fetch(`${API}/api/list-tests`);
    if (!r.ok) throw new Error(await r.text());
    const tests = await r.json();

    document.getElementById('testCountBadge').textContent = `${tests.length} 個測驗`;

    if (tests.length === 0) {
      el.innerHTML = '<div style="color:var(--dim);font-size:11px;">暫無測驗</div>';
      return;
    }
    el.innerHTML = tests.map(t => `
      <div class="test-item">
        <div class="t-title">${esc(t.title || t.id)}</div>
        <div class="t-meta">
          <span>位置 ${t.position ?? '—'}</span>
          <span>${t.question_count} 題</span>
          ${t.is_active
            ? '<span class="active-badge">啟用</span>'
            : '<span class="inactive-badge">停用</span>'}
        </div>
      </div>
    `).join('');
  } catch (e) {
    el.innerHTML = `<div style="color:var(--red);font-size:11px;">${esc(e.message)}</div>`;
  }
}

// ── Generate ──────────────────────────────────────────────────────────────────
async function generate() {
  const btn = document.getElementById('genBtn');
  const loadCard = document.getElementById('loadCard');
  const jsonArea = document.getElementById('jsonArea');
  const genEmpty = document.getElementById('genEmpty');

  btn.disabled = true;
  document.getElementById('genBtnIco').innerHTML = '<div class="spin"></div>';
  document.getElementById('genBtnTxt').textContent = '生成中...';
  loadCard.style.display = 'block';
  jsonArea.style.display = 'none';
  genEmpty.style.display = 'none';

  const payload = {
    hint:           document.getElementById('testHint').value.trim(),
    question_count: parseInt(document.getElementById('questionCount').value),
    result_count:   parseInt(document.getElementById('resultCount').value),
    bot_name:       document.getElementById('cfgBotName').value.trim() || 'Claude-3.7-Sonnet',
  };

  try {
    const r = await fetch(`${API}/api/generate`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });

    if (!r.ok) {
      const err = await r.json().catch(() => ({ detail: r.statusText }));
      throw new Error(err.detail || r.statusText);
    }

    const data = await r.json();
    const pretty = JSON.stringify(data.test_json, null, 2);

    document.getElementById('jsonOutput').value = pretty;
    loadCard.style.display = 'none';
    jsonArea.style.display = 'block';
    toast('測驗生成成功！', 'success');
  } catch (e) {
    loadCard.style.display = 'none';
    genEmpty.style.display = 'block';
    toast(`生成失敗：${e.message}`, 'error');
  } finally {
    btn.disabled = false;
    document.getElementById('genBtnIco').textContent = '✨';
    document.getElementById('genBtnTxt').textContent = '生成測驗';
  }
}

// ── Push to Supabase ──────────────────────────────────────────────────────────
async function pushToSupabase() {
  const btn = document.getElementById('pushBtn');
  const raw = document.getElementById('jsonOutput').value.trim();

  let testJson;
  try {
    testJson = JSON.parse(raw);
  } catch (e) {
    toast('JSON 格式錯誤，請先修正', 'error');
    return;
  }

  btn.disabled = true;
  document.getElementById('pushBtnIco').innerHTML = '<div class="spin"></div>';
  document.getElementById('pushBtnTxt').textContent = '推送中...';

  try {
    const r = await fetch(`${API}/api/push`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ test_json: testJson }),
    });

    if (!r.ok) {
      const err = await r.json().catch(() => ({ detail: r.statusText }));
      throw new Error(err.detail || r.statusText);
    }

    const data = await r.json();
    toast(`✅ 已推送：${data.upserted_id}`, 'success');
    await refreshTestList();
  } catch (e) {
    toast(`推送失敗：${e.message}`, 'error');
  } finally {
    btn.disabled = false;
    document.getElementById('pushBtnIco').textContent = '📤';
    document.getElementById('pushBtnTxt').textContent = '推送到 Supabase';
  }
}

// ── Manage tab ────────────────────────────────────────────────────────────────
async function loadManageTests() {
  const loading = document.getElementById('manageLoading');
  const content = document.getElementById('manageContent');

  loading.style.display = 'block';
  content.innerHTML = '';

  try {
    const r = await fetch(`${API}/api/list-tests`);
    if (!r.ok) throw new Error(await r.text());
    const tests = await r.json();

    loading.style.display = 'none';
    document.getElementById('testCountBadge').textContent = `${tests.length} 個測驗`;

    if (tests.length === 0) {
      content.innerHTML = `
        <div class="empty-state">
          <div class="ico">📋</div>
          <p>Supabase 中暫無心理測驗<br>使用「生成測驗」標籤創建第一個測驗</p>
        </div>`;
      return;
    }

    content.innerHTML = `
      <div class="tests-table-wrap">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>標題</th>
              <th>位置</th>
              <th>問題數</th>
              <th>狀態</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody>
            ${tests.map(t => `
              <tr id="row-${esc(t.id)}">
                <td><code style="font-size:11px;">${esc(t.id)}</code></td>
                <td style="font-weight:500;">${esc(t.title || '—')}</td>
                <td>
                  <input type="number" value="${t.position ?? ''}" min="1" max="99"
                    style="width:60px;background:var(--surface2);border:1px solid var(--border);
                           border-radius:4px;color:var(--text);padding:3px 6px;font-size:12px;outline:none;"
                    onblur="updatePosition('${esc(t.id)}', this.value)"
                    onkeydown="if(event.key==='Enter')this.blur()">
                </td>
                <td><span class="chip c-blue">${t.question_count} 題</span></td>
                <td>
                  ${t.is_active
                    ? '<span class="chip c-green">啟用</span>'
                    : '<span class="chip c-dim">停用</span>'}
                </td>
                <td>
                  <div class="actions">
                    <button class="btn-sm" onclick="toggleActive('${esc(t.id)}', ${t.is_active})">
                      ${t.is_active ? '⏸ 停用' : '▶ 啟用'}
                    </button>
                    <button class="btn-danger" onclick="deleteTest('${esc(t.id)}')" title="永久刪除">🗑</button>
                  </div>
                </td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      </div>`;
  } catch (e) {
    loading.style.display = 'none';
    content.innerHTML = `<div style="color:var(--red);padding:20px;">${esc(e.message)}</div>`;
  }
}

async function updatePosition(testId, value) {
  const pos = parseInt(value);
  if (isNaN(pos) || pos < 1) return;
  try {
    const r = await fetch(`${API}/api/tests/${encodeURIComponent(testId)}/position`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ position: pos }),
    });
    if (!r.ok) throw new Error((await r.json()).detail || r.statusText);
    toast(`位置已更新 → ${pos}`, 'success');
    refreshTestList();
  } catch (e) {
    toast(`更新失敗：${e.message}`, 'error');
  }
}

async function toggleActive(testId, currentActive) {
  try {
    const r = await fetch(`${API}/api/tests/${encodeURIComponent(testId)}/toggle-active`, {
      method: 'PATCH',
    });
    if (!r.ok) throw new Error((await r.json()).detail || r.statusText);
    const data = await r.json();
    toast(`測驗已${data.is_active ? '啟用' : '停用'}`, 'success');
    loadManageTests();
    refreshTestList();
  } catch (e) {
    toast(`操作失敗：${e.message}`, 'error');
  }
}

async function deleteTest(testId) {
  if (!confirm(`確定要永久刪除「${testId}」及其所有用戶測驗記錄？\n\n此操作不可逆。`)) return;
  try {
    const r = await fetch(`${API}/api/tests/${encodeURIComponent(testId)}`, { method: 'DELETE' });
    if (!r.ok) throw new Error((await r.json()).detail || r.statusText);
    toast(`已刪除：${testId}`, 'success');
    loadManageTests();
    refreshTestList();
  } catch (e) {
    toast(`刪除失敗：${e.message}`, 'error');
  }
}

async function deleteAllTests() {
  if (!confirm('⚠️ 確定要永久刪除所有心理測驗及所有用戶測驗記錄？\n\n此操作不可逆，請謹慎！')) return;
  try {
    const r = await fetch(`${API}/api/tests`, { method: 'DELETE' });
    if (!r.ok) throw new Error((await r.json()).detail || r.statusText);
    toast('已刪除所有測驗及用戶記錄', 'success');
    loadManageTests();
    refreshTestList();
  } catch (e) {
    toast(`刪除失敗：${e.message}`, 'error');
  }
}

// ── JSON helpers ──────────────────────────────────────────────────────────────
function copyJson() {
  const ta = document.getElementById('jsonOutput');
  navigator.clipboard.writeText(ta.value).then(() => toast('已複製到剪貼板', 'info'));
}

function formatJson() {
  const ta = document.getElementById('jsonOutput');
  try {
    ta.value = JSON.stringify(JSON.parse(ta.value), null, 2);
    toast('JSON 已格式化', 'info');
  } catch {
    toast('JSON 格式錯誤，無法格式化', 'error');
  }
}

// ── Toast notifications ───────────────────────────────────────────────────────
function toast(msg, type = 'info', duration = 3500) {
  const wrap = document.getElementById('toast-wrap');
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  const ico = type === 'success' ? '✅' : type === 'error' ? '❌' : 'ℹ️';
  el.innerHTML = `<span>${ico}</span><span>${esc(msg)}</span>`;
  wrap.appendChild(el);
  setTimeout(() => {
    el.classList.add('out');
    setTimeout(() => el.remove(), 300);
  }, duration);
}

// ── Utils ─────────────────────────────────────────────────────────────────────
function esc(s) {
  if (s == null) return '';
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

// ── Init ──────────────────────────────────────────────────────────────────────
(async function init() {
  loadConfig();
  await Promise.all([checkHealth(), refreshTestList()]);
})();
</script>
