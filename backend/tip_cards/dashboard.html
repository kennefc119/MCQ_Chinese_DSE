<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tip Card Admin Dashboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --surface2: #21262d;
      --surface3: #30363d;
      --border: #30363d;
      --text: #e6edf3;
      --muted: #8b949e;
      --dim: #6e7681;
      --accent: #58a6ff;
      --accent2: #79b8ff;
      --green: #3fb950;
      --yellow: #d29922;
      --red: #f85149;
      --purple: #bc8cff;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      height: 100vh;
      overflow: hidden;
    }
    .sidebar {
      width: 300px;
      min-width: 300px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }
    .sidebar-logo {
      padding: 18px 16px 14px;
      border-bottom: 1px solid var(--border);
    }
    .sidebar-logo h1 { font-size: 15px; font-weight: 700; }
    .sidebar-logo .sub { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .conn-pill {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      margin-top: 8px;
      padding: 3px 9px;
      border-radius: 20px;
      background: var(--surface2);
      color: var(--muted);
    }
    .conn-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--dim); }
    .conn-pill.ok .conn-dot { background: var(--green); }
    .conn-pill.ok { color: var(--green); }
    .conn-pill.err .conn-dot { background: var(--red); }
    .conn-pill.err { color: var(--red); }
    .s-section {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
    }
    .s-section h3 {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--muted);
      margin-bottom: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .form-group { margin-bottom: 10px; }
    .form-group label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 4px; }
    input[type="text"], textarea {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      padding: 7px 9px;
      font-size: 13px;
      outline: none;
      font-family: inherit;
    }
    input[type="text"]:focus, textarea:focus { border-color: var(--accent); }
    textarea { resize: vertical; }
    .btn-gen, .btn-push {
      width: 100%;
      padding: 11px;
      color: #0d1117;
      font-weight: 700;
      font-size: 14px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      transition: background .15s, opacity .15s;
      margin-top: 8px;
    }
    .btn-gen { background: var(--accent); }
    .btn-gen:hover:not(:disabled) { background: var(--accent2); }
    .btn-push { background: var(--green); }
    .btn-push:hover:not(:disabled) { background: #56d364; }
    .btn-gen:disabled, .btn-push:disabled { opacity: .5; cursor: not-allowed; }
    .btn-sm, .btn-danger {
      padding: 3px 8px;
      font-size: 11px;
      border-radius: 5px;
      cursor: pointer;
    }
    .btn-sm {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--muted);
    }
    .btn-sm:hover { color: var(--text); border-color: var(--muted); }
    .btn-danger {
      background: rgba(248,81,73,.1);
      border: 1px solid rgba(248,81,73,.3);
      color: var(--red);
    }
    .btn-danger:hover { background: rgba(248,81,73,.2); }
    .spin {
      width: 14px;
      height: 14px;
      border: 2px solid rgba(0,0,0,.25);
      border-top-color: #0d1117;
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    .spin-light {
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255,255,255,.2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .7s linear infinite;
      display: inline-block;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .card-item {
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
      font-size: 12px;
    }
    .card-item:last-child { border-bottom: none; }
    .card-item .t-title { color: var(--text); font-weight: 500; }
    .card-item .t-meta { color: var(--dim); font-size: 11px; margin-top: 2px; display: flex; gap: 6px; flex-wrap: wrap; }
    .active-badge, .inactive-badge, .chip {
      font-size: 10px;
      padding: 1px 6px;
      border-radius: 10px;
    }
    .active-badge { background: rgba(63,185,80,.15); color: var(--green); }
    .inactive-badge { background: var(--surface3); color: var(--dim); }
    .chip.c-study { background: rgba(88,166,255,.15); color: var(--accent); }
    .chip.c-exam_tip { background: rgba(210,153,34,.15); color: var(--yellow); }
    .chip.c-rest { background: rgba(188,140,255,.15); color: var(--purple); }
    .chip.c-wellness { background: rgba(63,185,80,.15); color: var(--green); }
    .main { flex: 1; overflow-y: auto; display: flex; flex-direction: column; }
    .main-hdr {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 16px 24px 12px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }
    .main-hdr h2 { font-size: 16px; font-weight: 600; }
    .badge {
      background: var(--surface2);
      color: var(--muted);
      font-size: 11px;
      padding: 2px 9px;
      border-radius: 20px;
    }
    .tabs {
      display: flex;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
    }
    .tab {
      padding: 10px 16px;
      font-size: 13px;
      font-weight: 500;
      color: var(--muted);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: color .12s, border-color .12s;
      user-select: none;
    }
    .tab:hover { color: var(--text); }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
    .tab-content { flex: 1; overflow-y: auto; }
    .tab-panel { display: none; padding: 24px; }
    .tab-panel.on { display: block; }
    .panel-grid {
      display: grid;
      grid-template-columns: 340px 1fr;
      gap: 20px;
      align-items: start;
    }
    .gen-card, .json-area, .analysis-grid, .cards-table-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
    }
    .gen-card { padding: 18px; }
    .gen-card h3, .section-hdr h3 {
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--muted);
      margin-bottom: 14px;
    }
    .json-area { overflow: hidden; }
    .json-area-hdr {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
    }
    .json-area-hdr span { font-size: 12px; font-weight: 600; color: var(--muted); }
    textarea.json-ta {
      width: 100%;
      min-height: 520px;
      background: var(--bg);
      border: none;
      color: var(--text);
      padding: 14px;
      font-family: "Cascadia Code", Consolas, monospace;
      font-size: 12px;
      line-height: 1.6;
      resize: vertical;
      outline: none;
    }
    .loading-card, .empty-state {
      border: 1px dashed var(--border);
      border-radius: 12px;
      padding: 60px 40px;
      text-align: center;
      color: var(--muted);
    }
    .loading-card { display: none; }
    .loading-bar { height: 3px; background: var(--surface2); border-radius: 2px; overflow: hidden; margin-top: 16px; }
    .loading-fill { height: 100%; background: var(--accent); width: 30%; border-radius: 2px; animation: lslide 1.4s ease-in-out infinite; }
    @keyframes lslide { 0% { margin-left: -30%; } 100% { margin-left: 100%; } }
    .section-hdr {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }
    .analysis-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 1px;
      overflow: hidden;
      margin-bottom: 18px;
    }
    .analysis-card {
      background: var(--surface);
      padding: 16px;
      border-right: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      min-height: 124px;
    }
    .analysis-card h4 { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 10px; }
    .analysis-card .big { font-size: 28px; font-weight: 800; margin-bottom: 8px; }
    .mini-list { display: grid; gap: 6px; font-size: 12px; color: var(--text); }
    .mini-row { display: flex; justify-content: space-between; gap: 12px; }
    .cards-table-wrap { overflow: hidden; }
    .cards-table-wrap table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .cards-table-wrap th, .cards-table-wrap td { padding: 10px 14px; text-align: left; vertical-align: top; }
    .cards-table-wrap thead tr { background: var(--surface2); }
    .cards-table-wrap th { color: var(--muted); font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: .06em; }
    .cards-table-wrap tbody tr { border-top: 1px solid var(--border); }
    .cards-table-wrap tbody tr:hover { background: var(--surface2); }
    .cards-table-wrap .actions { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
    #toast-wrap {
      position: fixed;
      top: 16px;
      right: 16px;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      gap: 8px;
      pointer-events: none;
    }
    .toast {
      padding: 11px 16px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 8px;
      max-width: 340px;
      pointer-events: auto;
      animation: slideIn .25s ease;
      box-shadow: 0 4px 12px rgba(0,0,0,.4);
    }
    .toast.success { background: rgba(63,185,80,.2); border: 1px solid rgba(63,185,80,.4); color: var(--green); }
    .toast.error { background: rgba(248,81,73,.2); border: 1px solid rgba(248,81,73,.4); color: var(--red); }
    .toast.info { background: rgba(88,166,255,.2); border: 1px solid rgba(88,166,255,.4); color: var(--accent); }
    @keyframes slideIn { from { transform: translateX(110%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    @keyframes slideOut { from { transform: translateX(0); opacity: 1; } to { transform: translateX(110%); opacity: 0; } }
    .toast.out { animation: slideOut .25s ease forwards; }
    code {
      background: var(--surface2);
      padding: 1px 6px;
      border-radius: 3px;
      color: var(--accent);
      font-size: 12px;
      font-family: "Cascadia Code", Consolas, monospace;
    }
    @media (max-width: 1100px) {
      .panel-grid { grid-template-columns: 1fr; }
      .analysis-grid { grid-template-columns: 1fr; }
      .sidebar { width: 270px; min-width: 270px; }
    }
  </style>
</head>
<body>
<aside class="sidebar">
  <div class="sidebar-logo">
    <h1>🃏 Tip Card Admin</h1>
    <div class="sub">DSE 貼士卡生成系統</div>
    <div class="conn-pill" id="connPill">
      <span class="conn-dot"></span>
      <span id="connTxt">連接中...</span>
    </div>
  </div>

  <div class="s-section">
    <h3>Bot 設定</h3>
    <div class="form-group">
      <label>Tip Card Bot 名稱</label>
      <input type="text" id="cfgBotName" value="GPT-5.4-Mini" autocomplete="off">
    </div>
    <button class="btn-sm" onclick="saveConfig()" style="width:100%;margin-top:4px;">💾 儲存設定</button>
  </div>

  <div class="s-section" style="flex:1;border-bottom:none;">
    <h3>
      現有貼士卡
      <button class="btn-sm" onclick="refreshSidebarCards()">🔄</button>
    </h3>
    <div id="sidebarCards">
      <div style="color:var(--dim);font-size:11px;">載入中...</div>
    </div>
  </div>
</aside>

<div class="main">
  <div class="main-hdr">
    <h2>✨ 貼士卡生成系統</h2>
    <span class="badge" id="cardCountBadge">0 張卡</span>
  </div>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('generate', this)">✨ 生成貼士卡</div>
    <div class="tab" onclick="switchTab('manage', this)">📋 卡片管理</div>
  </div>

  <div class="tab-content">
    <div class="tab-panel on" id="tab-generate">
      <div class="panel-grid">
        <div>
          <div class="gen-card">
            <h3>生成設定</h3>
            <div class="form-group">
              <label>給 Poe Bot 的提示 <span style="color:var(--dim);font-size:10px;">(只作生成方向，不會直接顯示在卡片)</span></label>
              <textarea id="cardHint" rows="10" placeholder="例如：請生成一張關於 DSE 文言文溫習節奏的 study 類貼士卡，重點是如何分段複習與避免死記硬背。"></textarea>
            </div>
            <button class="btn-gen" id="genBtn" onclick="generateCard()">
              <span id="genBtnIco">✨</span>
              <span id="genBtnTxt">生成貼士卡</span>
            </button>
          </div>
        </div>

        <div>
          <div class="loading-card" id="loadCard">
            <div style="font-size:32px;">🤖</div>
            <div style="font-size:14px;color:var(--muted);margin-top:8px;">正在生成貼士卡，請稍候...</div>
            <div style="font-size:12px;color:var(--dim);margin-top:4px;">通常需要 20–60 秒</div>
            <div class="loading-bar"><div class="loading-fill"></div></div>
          </div>

          <div class="json-area" id="jsonArea" style="display:none;">
            <div class="json-area-hdr">
              <span>📄 生成的貼士卡 JSON</span>
              <div style="display:flex;gap:6px;">
                <button class="btn-sm" onclick="copyJson()">📋 複製</button>
                <button class="btn-sm" onclick="formatJson()">🔧 格式化</button>
              </div>
            </div>
            <textarea class="json-ta" id="jsonOutput" spellcheck="false"></textarea>
            <div style="padding:12px 14px;border-top:1px solid var(--border);background:var(--surface);">
              <button class="btn-push" id="pushBtn" onclick="pushToSupabase()">
                <span id="pushBtnIco">📤</span>
                <span id="pushBtnTxt">推送到 Supabase</span>
              </button>
            </div>
          </div>

          <div class="empty-state" id="genEmpty">
            <div style="font-size:40px;margin-bottom:12px;">🃏</div>
            <p>
              輸入卡片方向並點擊「生成貼士卡」<br>
              Poe 會為你生成完整的 tip card JSON<br>
              <span style="font-size:11px;color:var(--dim);">推送前可先在右側檢查及微調</span>
            </p>
          </div>
        </div>
      </div>
    </div>

    <div class="tab-panel" id="tab-manage">
      <div class="section-hdr">
        <h3>現有貼士卡與分析</h3>
        <button class="btn-sm" onclick="loadManageCards()">🔄 刷新</button>
      </div>

      <div id="manageLoading" style="text-align:center;padding:40px;color:var(--muted);display:none;">
        <div class="spin-light" style="margin:0 auto 10px;"></div>
        <div>載入中...</div>
      </div>

      <div id="manageContent">
        <div class="empty-state">
          <div style="font-size:40px;margin-bottom:12px;">📋</div>
          <p>點擊「刷新」載入貼士卡分析</p>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="toast-wrap"></div>

<script>
const API = 'http://127.0.0.1:8767';

function esc(value) {
  return String(value ?? '')
    .replaceAll('&', '&amp;')
    .replaceAll('<', '&lt;')
    .replaceAll('>', '&gt;')
    .replaceAll('"', '&quot;')
    .replaceAll("'", '&#39;');
}

function toast(message, kind='info') {
  const wrap = document.getElementById('toast-wrap');
  const el = document.createElement('div');
  el.className = `toast ${kind}`;
  el.textContent = message;
  wrap.appendChild(el);
  setTimeout(() => el.classList.add('out'), 2600);
  setTimeout(() => el.remove(), 2900);
}

function loadConfig() {
  const botName = localStorage.getItem('tip_card_bot_name') || 'GPT-5.4-Mini';
  document.getElementById('cfgBotName').value = botName;
}

function saveConfig() {
  localStorage.setItem('tip_card_bot_name', document.getElementById('cfgBotName').value.trim());
  toast('設定已儲存', 'success');
}

function switchTab(name, el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('on'));
  el.classList.add('active');
  document.getElementById('tab-' + name).classList.add('on');
  if (name === 'manage') loadManageCards();
}

async function checkHealth() {
  const pill = document.getElementById('connPill');
  const txt = document.getElementById('connTxt');
  try {
    const r = await fetch(`${API}/api/health`, { signal: AbortSignal.timeout(5000) });
    const d = await r.json();
    if (d.status === 'ok') {
      pill.className = 'conn-pill ok';
      txt.textContent = 'Supabase 已連接';
    } else {
      pill.className = 'conn-pill err';
      txt.textContent = d.detail || '連接錯誤';
    }
  } catch {
    pill.className = 'conn-pill err';
    txt.textContent = '伺服器未連接';
  }
}

async function refreshSidebarCards() {
  const el = document.getElementById('sidebarCards');
  el.innerHTML = '<div style="color:var(--dim);font-size:11px;"><span class="spin-light" style="vertical-align:middle;margin-right:6px;"></span>載入中...</div>';
  try {
    const r = await fetch(`${API}/api/list-cards`);
    if (!r.ok) throw new Error(await r.text());
    const payload = await r.json();
    const cards = payload.cards || [];
    document.getElementById('cardCountBadge').textContent = `${cards.length} 張卡`;
    if (cards.length === 0) {
      el.innerHTML = '<div style="color:var(--dim);font-size:11px;">暫無貼士卡</div>';
      return;
    }
    el.innerHTML = cards.map(card => `
      <div class="card-item">
        <div class="t-title">${esc(card.title || card.id)}</div>
        <div class="t-meta">
          <span class="chip c-${esc(card.category)}">${esc(card.category)}</span>
          <span>位置 ${esc(card.position)}</span>
          <span>${esc(card.read_time_minutes)} 分鐘</span>
          ${card.is_active ? '<span class="active-badge">啟用</span>' : '<span class="inactive-badge">停用</span>'}
        </div>
      </div>
    `).join('');
  } catch (e) {
    el.innerHTML = `<div style="color:var(--red);font-size:11px;">${esc(e.message)}</div>`;
  }
}

async function generateCard() {
  const btn = document.getElementById('genBtn');
  const loadCard = document.getElementById('loadCard');
  const jsonArea = document.getElementById('jsonArea');
  const genEmpty = document.getElementById('genEmpty');

  btn.disabled = true;
  document.getElementById('genBtnIco').innerHTML = '<div class="spin"></div>';
  document.getElementById('genBtnTxt').textContent = '生成中...';
  loadCard.style.display = 'block';
  jsonArea.style.display = 'none';
  genEmpty.style.display = 'none';

  const payload = {
    hint: document.getElementById('cardHint').value.trim(),
    bot_name: document.getElementById('cfgBotName').value.trim() || 'GPT-5.4-Mini',
  };

  try {
    const r = await fetch(`${API}/api/generate`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
    if (!r.ok) {
      const err = await r.json().catch(() => ({ detail: r.statusText }));
      throw new Error(err.detail || r.statusText);
    }
    const data = await r.json();
    document.getElementById('jsonOutput').value = JSON.stringify(data.card_json, null, 2);
    loadCard.style.display = 'none';
    jsonArea.style.display = 'block';
    toast('貼士卡生成成功！', 'success');
  } catch (e) {
    loadCard.style.display = 'none';
    genEmpty.style.display = 'block';
    toast(`生成失敗：${e.message}`, 'error');
  } finally {
    btn.disabled = false;
    document.getElementById('genBtnIco').textContent = '✨';
    document.getElementById('genBtnTxt').textContent = '生成貼士卡';
  }
}

async function pushToSupabase() {
  const btn = document.getElementById('pushBtn');
  const raw = document.getElementById('jsonOutput').value.trim();
  let cardJson;
  try {
    cardJson = JSON.parse(raw);
  } catch {
    toast('JSON 格式錯誤，請先修正', 'error');
    return;
  }

  btn.disabled = true;
  document.getElementById('pushBtnIco').innerHTML = '<div class="spin"></div>';
  document.getElementById('pushBtnTxt').textContent = '推送中...';

  try {
    const r = await fetch(`${API}/api/push`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ card_json: cardJson }),
    });
    if (!r.ok) {
      const err = await r.json().catch(() => ({ detail: r.statusText }));
      throw new Error(err.detail || r.statusText);
    }
    const data = await r.json();
    toast(`✅ 已推送：${data.upserted_id}`, 'success');
    await refreshSidebarCards();
  } catch (e) {
    toast(`推送失敗：${e.message}`, 'error');
  } finally {
    btn.disabled = false;
    document.getElementById('pushBtnIco').textContent = '📤';
    document.getElementById('pushBtnTxt').textContent = '推送到 Supabase';
  }
}

function copyJson() {
  const ta = document.getElementById('jsonOutput');
  ta.select();
  document.execCommand('copy');
  toast('已複製 JSON', 'success');
}

function formatJson() {
  try {
    const ta = document.getElementById('jsonOutput');
    ta.value = JSON.stringify(JSON.parse(ta.value), null, 2);
    toast('JSON 已格式化', 'success');
  } catch {
    toast('JSON 格式錯誤，無法格式化', 'error');
  }
}

function renderAnalysis(payload) {
  const analysis = payload.analysis || {};
  const categoryCounts = analysis.category_counts || {};
  const readTimeCounts = analysis.read_time_counts || {};
  const duplicatePositions = analysis.duplicate_positions || [];
  const repeatedImages = analysis.repeated_images || [];

  return `
    <div class="analysis-grid">
      <div class="analysis-card">
        <h4>卡片總數</h4>
        <div class="big">${esc(analysis.total || 0)}</div>
        <div class="mini-list">
          <div class="mini-row"><span>啟用</span><span>${esc(analysis.active || 0)}</span></div>
          <div class="mini-row"><span>停用</span><span>${esc(analysis.inactive || 0)}</span></div>
        </div>
      </div>
      <div class="analysis-card">
        <h4>分類分佈</h4>
        <div class="mini-list">
          ${Object.entries(categoryCounts).map(([key, value]) => `<div class="mini-row"><span>${esc(key)}</span><span>${esc(value)}</span></div>`).join('')}
        </div>
      </div>
      <div class="analysis-card">
        <h4>閱讀時間</h4>
        <div class="mini-list">
          ${Object.keys(readTimeCounts).length > 0
            ? Object.entries(readTimeCounts).map(([key, value]) => `<div class="mini-row"><span>${esc(key)} 分鐘</span><span>${esc(value)}</span></div>`).join('')
            : '<div style="color:var(--dim);font-size:12px;">暫無資料</div>'}
        </div>
      </div>
      <div class="analysis-card">
        <h4>位置檢查</h4>
        ${duplicatePositions.length > 0
          ? `<div class="mini-list"><div>重複位置：${duplicatePositions.map(esc).join(', ')}</div></div>`
          : '<div style="color:var(--green);font-size:12px;">未發現重複位置</div>'}
      </div>
      <div class="analysis-card">
        <h4>圖片重覆</h4>
        <div class="mini-list">
          ${repeatedImages.length > 0
            ? repeatedImages.slice(0, 4).map(item => `<div>${esc(item.count)} 次 · ${esc(item.image_url.split('/').pop())}</div>`).join('')
            : '<div style="color:var(--dim);font-size:12px;">暫無重覆圖片</div>'}
        </div>
      </div>
      <div class="analysis-card">
        <h4>目前規則</h4>
        <div class="mini-list">
          <div>圖片由伺服器從 <code>dse_chi</code> 圖庫隨機分配</div>
          <div>提示只作生成方向，不直接入庫</div>
        </div>
      </div>
    </div>
  `;
}

function renderCardsTable(cards) {
  if (!cards.length) {
    return `
      <div class="empty-state">
        <div style="font-size:40px;margin-bottom:12px;">📭</div>
        <p>目前資料庫沒有貼士卡</p>
      </div>
    `;
  }

  return `
    <div class="cards-table-wrap">
      <table>
        <thead>
          <tr>
            <th>標題</th>
            <th>分類</th>
            <th>位置</th>
            <th>時間</th>
            <th>狀態</th>
            <th>圖片</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody>
          ${cards.map(card => `
            <tr>
              <td>
                <div style="font-weight:600;">${esc(card.title)}</div>
                <div style="font-size:11px;color:var(--muted);margin-top:4px;">${esc(card.subtitle || '')}</div>
              </td>
              <td><span class="chip c-${esc(card.category)}">${esc(card.category)}</span></td>
              <td>${esc(card.position)}</td>
              <td>${esc(card.read_time_minutes)} 分鐘</td>
              <td>${card.is_active ? '<span class="active-badge">啟用</span>' : '<span class="inactive-badge">停用</span>'}</td>
              <td style="font-size:11px;color:var(--muted);">${esc((card.image_url || '').split('/').pop() || '—')}</td>
              <td>
                <div class="actions">
                  <button class="btn-sm" onclick="toggleCard('${esc(card.id)}')">切換啟用</button>
                  <button class="btn-danger" onclick="deleteCard('${esc(card.id)}')">刪除</button>
                </div>
              </td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    </div>
  `;
}

async function loadManageCards() {
  const loading = document.getElementById('manageLoading');
  const content = document.getElementById('manageContent');
  loading.style.display = 'block';
  content.innerHTML = '';
  try {
    const r = await fetch(`${API}/api/list-cards`);
    if (!r.ok) throw new Error(await r.text());
    const payload = await r.json();
    content.innerHTML = renderAnalysis(payload) + renderCardsTable(payload.cards || []);
  } catch (e) {
    content.innerHTML = `<div class="empty-state"><div style="font-size:40px;margin-bottom:12px;">⚠️</div><p>${esc(e.message)}</p></div>`;
  } finally {
    loading.style.display = 'none';
  }
}

async function toggleCard(cardId) {
  try {
    const r = await fetch(`${API}/api/cards/${encodeURIComponent(cardId)}/toggle-active`, { method: 'PATCH' });
    if (!r.ok) {
      const err = await r.json().catch(() => ({ detail: r.statusText }));
      throw new Error(err.detail || r.statusText);
    }
    toast('已切換卡片狀態', 'success');
    await Promise.all([loadManageCards(), refreshSidebarCards()]);
  } catch (e) {
    toast(`操作失敗：${e.message}`, 'error');
  }
}

async function deleteCard(cardId) {
  if (!confirm(`確定刪除 ${cardId}？此操作無法還原。`)) return;
  try {
    const r = await fetch(`${API}/api/cards/${encodeURIComponent(cardId)}`, { method: 'DELETE' });
    if (!r.ok) {
      const err = await r.json().catch(() => ({ detail: r.statusText }));
      throw new Error(err.detail || r.statusText);
    }
    toast(`已刪除 ${cardId}`, 'success');
    await Promise.all([loadManageCards(), refreshSidebarCards()]);
  } catch (e) {
    toast(`刪除失敗：${e.message}`, 'error');
  }
}

loadConfig();
checkHealth();
refreshSidebarCards();
</script>
</body>
</html>
