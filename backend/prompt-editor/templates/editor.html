<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>提示詞管理 — 文淵 MCQ Generator</title>
<style>
:root {
  --bg: #0F0C09; --surface: #1A1510; --surface2: #231E17; --surface3: #2E271E;
  --border: #3D3020; --primary: #D4A24C; --primary-d: #B8893A;
  --text: #F0E6D2; --muted: #8A7B62; --success: #5C8A50; --error: #B23A2E; --warning: #C28A1E;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);font-size:14px}

.topbar{position:sticky;top:0;z-index:100;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:14px;padding:0 24px;height:54px}
.brand{font-size:16px;font-weight:700;color:var(--primary)}
.brand small{font-size:11px;color:var(--muted);font-weight:400;margin-left:6px}
.legend{display:flex;gap:12px;align-items:center;padding:4px 10px;background:var(--surface2);border-radius:6px;border:1px solid var(--border)}
.leg{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--muted)}
.leg-dot{width:8px;height:8px;border-radius:2px}
.spacer{flex:1}
.save-status{font-size:12px;color:var(--muted)}
.save-status.dirty{color:var(--warning)}
.save-status.ok{color:var(--success)}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 16px;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:background .15s,opacity .15s}
.btn-primary{background:var(--primary);color:#0F0C09}
.btn-primary:hover{background:var(--primary-d)}
.btn-primary:disabled{opacity:.4;cursor:not-allowed}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border)}
.btn-ghost:hover{border-color:var(--primary);color:var(--primary)}

.main-scroll{overflow-y:auto;height:calc(100vh - 54px);padding:28px 0 80px}
.agents-container{max-width:880px;margin:0 auto;padding:0 24px;display:flex;flex-direction:column;gap:0}

.flow-arrow{display:flex;justify-content:center;align-items:center;height:36px;color:var(--muted);font-size:18px;opacity:.6;user-select:none}

.agent-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:0}
.agent-card-header{display:flex;align-items:center;gap:12px;padding:14px 20px;background:var(--surface2);border-bottom:1px solid var(--border)}
.agent-num{width:26px;height:26px;border-radius:50%;background:rgba(212,162,76,.15);color:var(--primary);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.agent-title{font-size:15px;font-weight:700}
.agent-desc{font-size:12px;color:var(--muted);flex:1}

.add-pill-wrap{position:relative}
.add-pill-btn{display:inline-flex;align-items:center;gap:5px;padding:5px 11px;border-radius:5px;font-size:11px;font-weight:600;cursor:pointer;border:1px dashed var(--border);background:transparent;color:var(--muted);transition:border-color .12s,color .12s}
.add-pill-btn:hover{border-color:var(--primary);color:var(--primary)}
.pill-menu{display:none;position:absolute;right:0;top:calc(100% + 6px);background:var(--surface2);border:1px solid var(--border);border-radius:8px;min-width:280px;z-index:200;box-shadow:0 8px 24px rgba(0,0,0,.5);overflow:hidden}
.pill-menu.open{display:block}
.pill-menu-hdr{padding:7px 12px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);border-bottom:1px solid var(--border)}
.pill-menu-item{display:flex;align-items:center;gap:10px;padding:8px 12px;cursor:pointer;font-size:12px;transition:background .1s}
.pill-menu-item:hover{background:var(--surface3)}
.pmi-icon{font-size:13px;flex-shrink:0}
.pmi-label{flex:1;font-weight:600}
.pmi-key{font-size:10px;color:var(--muted);font-family:monospace}
.pill-menu-sep{height:1px;background:var(--border);margin:4px 0}

.block-editor{padding:14px 20px;display:flex;flex-direction:column;min-height:100px}

.drop-zone{height:3px;border-radius:2px;transition:background .1s,height .1s;margin:1px 0}
.drop-zone.dz-active{height:5px;background:var(--primary);border-radius:2px}

.text-block{width:100%;background:transparent;color:var(--text);border:none;outline:none;resize:none;padding:4px 2px;font-family:"SF Mono","Cascadia Code","Fira Code",monospace;font-size:13px;line-height:1.75;tab-size:2;overflow:hidden;min-height:1.75em}
.text-block:focus{background:rgba(212,162,76,.035);border-radius:4px;padding:4px 8px;margin:0 -8px}

.pill-block{display:inline-flex;align-items:stretch;border-radius:6px;font-size:12px;font-weight:600;user-select:none;margin:3px 0;align-self:flex-start;position:relative;cursor:default;max-width:100%}
.pill-block.dragging{opacity:.35}
.ph{padding:5px 5px 5px 9px;cursor:grab;opacity:.45;font-size:13px;display:flex;align-items:center}
.ph:hover{opacity:.9}
.ph:active{cursor:grabbing}
.pi{padding:5px 3px 5px 0;display:flex;align-items:center}
.pl{padding:5px 0;display:flex;align-items:center}
.pk{padding:5px 6px 5px 5px;font-family:monospace;font-size:10px;opacity:.65;display:flex;align-items:center}
.pdel{padding:5px 8px 5px 2px;cursor:pointer;opacity:0;font-size:14px;line-height:1;transition:opacity .1s;background:none;border:none;color:inherit;display:flex;align-items:center}
.pill-block:hover .pdel{opacity:.55}
.pdel:hover{opacity:1!important}
.pexp{padding:5px 7px 5px 0;cursor:pointer;font-size:10px;opacity:.7;transition:opacity .1s,transform .2s;background:none;border:none;color:inherit;display:flex;align-items:center}
.pexp:hover{opacity:1}
.pexp.open{transform:rotate(180deg)}

.pt-runtime{background:rgba(107,114,128,.14);color:#9CA3AF;border:1px solid rgba(107,114,128,.28)}
.pt-db{background:rgba(59,130,246,.12);color:#60A5FA;border:1px solid rgba(59,130,246,.24)}
.pt-file_path{background:rgba(217,119,6,.12);color:#FCD34D;border:1px solid rgba(217,119,6,.28)}
.pt-editable_prompt{background:rgba(212,162,76,.14);color:var(--primary);border:1px solid rgba(212,162,76,.32);cursor:pointer}

.pill-tip{display:none;position:absolute;bottom:calc(100% + 7px);left:0;background:var(--surface3);border:1px solid var(--border);border-radius:7px;padding:9px 13px;min-width:200px;max-width:300px;font-size:11px;line-height:1.55;color:var(--text);box-shadow:0 4px 16px rgba(0,0,0,.45);z-index:300;pointer-events:none;white-space:normal}
.pill-block:hover .pill-tip{display:block}
.tip-title{font-weight:700;color:var(--primary);margin-bottom:3px}
.tip-src{font-size:10px;color:var(--muted);margin-top:4px;font-family:monospace}

.closing-editor{display:none;margin:4px 0 8px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;overflow:hidden}
.closing-editor.ce-open{display:block}
.closing-tabs{display:flex;border-bottom:1px solid var(--border)}
.ce-tab{padding:9px 16px;font-size:12px;cursor:pointer;color:var(--muted);border-bottom:2px solid transparent;transition:color .1s;font-weight:500}
.ce-tab.active{color:var(--primary);border-bottom-color:var(--primary)}
.ce-body{padding:12px 14px;display:none}
.ce-body.active{display:block}
.ce-textarea{width:100%;background:var(--surface3);color:var(--text);border:1px solid var(--border);border-radius:6px;padding:10px 12px;font-family:"SF Mono","Cascadia Code","Fira Code",monospace;font-size:12px;line-height:1.7;resize:vertical;min-height:72px;outline:none}
.ce-textarea:focus{border-color:var(--primary)}
.ce-note{font-size:11px;color:var(--muted);margin-top:6px;line-height:1.5}
.ce-pill-preview{display:flex;flex-wrap:wrap;gap:4px;margin-top:8px}

.toast{position:fixed;bottom:24px;right:24px;padding:10px 18px;border-radius:8px;font-size:13px;font-weight:600;background:var(--success);color:#fff;transform:translateY(60px);opacity:0;transition:transform .25s ease,opacity .25s ease;pointer-events:none;z-index:9999}
.toast.show{transform:translateY(0);opacity:1}
.toast.err{background:var(--error)}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{display:inline-block;width:13px;height:13px;border:2px solid currentColor;border-top-color:transparent;border-radius:50%;animation:spin .6s linear infinite}
</style>
</head>
<body>
<header class="topbar">
  <span class="brand">提示詞管理 <small>文淵 MCQ Generator</small></span>
  <div class="legend">
    <span class="leg"><span class="leg-dot" style="background:#60A5FA"></span>資料庫注入</span>
    <span class="leg"><span class="leg-dot" style="background:#9CA3AF"></span>執行時計算</span>
    <span class="leg"><span class="leg-dot" style="background:#FCD34D"></span>檔案路徑</span>
    <span class="leg"><span class="leg-dot" style="background:#D4A24C"></span>可編輯文本（點擊展開）</span>
  </div>
  <div class="spacer"></div>
  <span class="save-status" id="saveStatus"></span>
  <button class="btn btn-ghost" onclick="resetAll()">重置</button>
  <button class="btn btn-primary" id="saveBtn" onclick="saveAll()"><span id="saveBtnInner">💾 儲存全部</span></button>
</header>
<main class="main-scroll">
  <div class="agents-container" id="agentsContainer"></div>
</main>
<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════
const S = {
  agentPrompts: {},   // key → {label,order,filename,description,content}
  closingPrompts: {}, // key → {label,filename,variant,content}
  variables: {},      // key → {label,description,source_type,editable,...}
  blocks: {},         // agentKey → Block[]
  dirtyAgents: {},    // agentKey → true
  dirtyClosing: {},   // closingKey → true
  closingOpen: {},    // agentKey → bool
  closingTab: {},     // agentKey → 'initial'|'revision'
  drag: null,         // {agentKey, idx}
};

// ═══════════════════════════════════════════════════
// BOOT
// ═══════════════════════════════════════════════════
async function boot() {
  try {
    const r = await fetch('/api/data');
    const d = await r.json();
    S.agentPrompts = d.agent_prompts || {};
    S.closingPrompts = d.closing_prompts || {};
    S.variables = d.variables || {};

    // Sort agents by order field
    const agentKeys = Object.keys(S.agentPrompts).sort(
      (a,b) => (S.agentPrompts[a].order||99) - (S.agentPrompts[b].order||99)
    );

    // Parse each agent template into blocks
    agentKeys.forEach(k => {
      S.blocks[k] = parseTemplate(S.agentPrompts[k].content || '');
      S.closingTab[k] = 'initial';
    });

    renderAllCards(agentKeys);
  } catch(e) {
    toast('載入失敗：' + e.message, true);
  }
}

// ═══════════════════════════════════════════════════
// TEMPLATE PARSING / SERIALIZATION
// ═══════════════════════════════════════════════════
function parseTemplate(text) {
  const parts = text.split(/(\{\{\w+\}\})/);
  const blocks = [];
  parts.forEach(p => {
    const m = p.match(/^\{\{(\w+)\}\}$/);
    if (m) {
      blocks.push({ type: 'pill', var: m[1] });
    } else if (p !== '') {
      blocks.push({ type: 'text', content: p });
    }
  });
  return blocks;
}

function serializeBlocks(blocks) {
  return blocks.map(b => b.type === 'pill' ? '{{' + b.var + '}}' : b.content).join('');
}

// ═══════════════════════════════════════════════════
// RENDER AGENT CARDS
// ═══════════════════════════════════════════════════
function renderAllCards(agentKeys) {
  const container = document.getElementById('agentsContainer');
  container.innerHTML = '';

  agentKeys.forEach((key, i) => {
    if (i > 0) {
      const arrow = document.createElement('div');
      arrow.className = 'flow-arrow';
      arrow.textContent = '↓';
      container.appendChild(arrow);
    }
    // Append card shell to DOM FIRST so getElementById works inside
    const card = buildAgentCardShell(key);
    container.appendChild(card);
    // Now safe to query by ID
    buildPillMenu(key);
    renderBlockEditor(key);
  });

  // One shared listener to close all pill menus on outside click
  document.addEventListener('click', e => {
    if (!e.target.closest('.add-pill-wrap')) {
      document.querySelectorAll('.pill-menu.open').forEach(m => m.classList.remove('open'));
    }
  }, { capture: true });
}

function buildAgentCardShell(agentKey) {
  const ap = S.agentPrompts[agentKey];
  const card = document.createElement('div');
  card.className = 'agent-card';
  card.id = 'card-' + agentKey;
  card.innerHTML = `
    <div class="agent-card-header">
      <div class="agent-num">${esc(String(ap.order))}</div>
      <div class="agent-title">${esc(ap.label)}</div>
      <div class="agent-desc">${esc(ap.description||'')}</div>
      <div class="add-pill-wrap" id="addwrap-${agentKey}">
        <button class="add-pill-btn" onclick="togglePillMenu('${agentKey}')">＋ 添加注入</button>
        <div class="pill-menu" id="pillmenu-${agentKey}"></div>
      </div>
    </div>
    <div class="block-editor" id="editor-${agentKey}"></div>
  `;
  return card;
}

// ═══════════════════════════════════════════════════
// PILL MENU
// ═══════════════════════════════════════════════════
function buildPillMenu(agentKey) {
  const menu = document.getElementById('pillmenu-' + agentKey);
  if (!menu) return;
  menu.innerHTML = '<div class="pill-menu-hdr">插入注入變量</div>';

  const vars = Object.entries(S.variables);
  if (vars.length === 0) {
    menu.innerHTML += '<div style="padding:10px 12px;font-size:12px;color:var(--muted)">（無可用變量）</div>';
    return;
  }

  const typeOrder = ['db', 'editable_prompt', 'file_path', 'runtime'];
  const grouped = {};
  typeOrder.forEach(t => grouped[t] = []);
  vars.forEach(([k, v]) => {
    const t = v.source_type || 'runtime';
    if (!grouped[t]) grouped[t] = [];
    grouped[t].push([k, v]);
  });

  const typeLabels = { db:'資料庫', editable_prompt:'可編輯文本', file_path:'檔案路徑', runtime:'執行時計算' };

  let first = true;
  typeOrder.forEach(t => {
    const items = grouped[t] || [];
    if (!items.length) return;
    if (!first) menu.innerHTML += '<div class="pill-menu-sep"></div>';
    first = false;
    menu.innerHTML += `<div class="pill-menu-hdr" style="padding:5px 12px">${typeLabels[t]||t}</div>`;
    items.forEach(([k, v]) => {
      const icon = pillIcon(v.source_type);
      const div = document.createElement('div');
      div.className = 'pill-menu-item';
      div.innerHTML = `<span class="pmi-icon">${icon}</span><span class="pmi-label">${esc(v.label||k)}</span><span class="pmi-key">{{${esc(k)}}}</span>`;
      div.onclick = () => { addPillToAgent(agentKey, k); menu.classList.remove('open'); };
      menu.appendChild(div);
    });
  });
}

function togglePillMenu(agentKey) {
  const menu = document.getElementById('pillmenu-' + agentKey);
  if (menu) menu.classList.toggle('open');
}

// ═══════════════════════════════════════════════════
// BLOCK EDITOR RENDERING
// ═══════════════════════════════════════════════════
function renderBlockEditor(agentKey) {
  const editor = document.getElementById('editor-' + agentKey);
  if (!editor) return;
  editor.innerHTML = '';

  const blocks = S.blocks[agentKey] || [];

  // Opening drop zone
  editor.appendChild(makeDropZone(agentKey, 0));

  blocks.forEach((block, idx) => {
    if (block.type === 'text') {
      editor.appendChild(makeTextBlockEl(agentKey, idx));
    } else {
      editor.appendChild(makePillBlockEl(agentKey, idx));
      // If this is a closing_section pill and it's open, add the closing editor
      if (block.var === 'closing_section' && S.closingOpen[agentKey]) {
        editor.appendChild(makeClosingEditor(agentKey));
      }
    }
    // Drop zone after each block
    editor.appendChild(makeDropZone(agentKey, idx + 1));
  });

  if (blocks.length === 0) {
    const b0 = { type: 'text', content: '' };
    S.blocks[agentKey] = [b0];
    editor.innerHTML = '';
    editor.appendChild(makeDropZone(agentKey, 0));
    editor.appendChild(makeTextBlockEl(agentKey, 0));
    editor.appendChild(makeDropZone(agentKey, 1));
  }

  // Auto-resize all textareas after layout is committed
  requestAnimationFrame(() => editor.querySelectorAll('textarea').forEach(autoResize));
}

function makeTextBlockEl(agentKey, idx) {
  const block = S.blocks[agentKey][idx];
  const ta = document.createElement('textarea');
  ta.className = 'text-block';
  ta.value = block.content;
  ta.placeholder = '在此輸入提示詞文本...';
  ta.spellcheck = false;
  autoResize(ta);
  ta.addEventListener('input', () => {
    S.blocks[agentKey][idx].content = ta.value;
    markAgentDirty(agentKey);
    autoResize(ta);
  });
  // Enable drag over text blocks too
  ta.addEventListener('dragover', e => { e.preventDefault(); highlightNearestDZ(agentKey, idx); });
  ta.addEventListener('drop', e => { e.preventDefault(); handleDrop(agentKey, idx); });
  return ta;
}

function makePillBlockEl(agentKey, idx) {
  const block = S.blocks[agentKey][idx];
  const varKey = block.var;
  const v = S.variables[varKey] || { label: varKey, description:'', source_type:'runtime', editable:false };
  const srcType = v.source_type || 'runtime';
  const icon = pillIcon(srcType);
  const isEditable = (srcType === 'editable_prompt');

  const pill = document.createElement('div');
  pill.className = `pill-block pt-${srcType}`;
  pill.setAttribute('draggable', 'true');
  pill.dataset.idx = idx;

  // Tooltip
  const srcLabels = { db:'資料庫（執行時讀取）', runtime:'執行時計算（不可直接編輯）', file_path:'檔案路徑（執行時載入）', editable_prompt:'可編輯文本（點擊展開編輯）' };
  pill.innerHTML = `
    <div class="pill-tip">
      <div class="tip-title">${esc(v.label||varKey)}</div>
      ${esc(v.description||'')}
      <div class="tip-src">${srcLabels[srcType]||srcType}</div>
    </div>
    <span class="ph" title="拖動重新排序">⠿</span>
    <span class="pi">${icon}</span>
    <span class="pl">${esc(v.label||varKey)}</span>
    <span class="pk">{{${esc(varKey)}}}</span>
    ${isEditable ? `<button class="pexp" id="pexp-${agentKey}-${varKey}" onclick="toggleClosing('${agentKey}')" title="展開編輯">▼</button>` : ''}
    <button class="pdel" onclick="deletePill('${agentKey}',${idx})" title="移除此注入">✕</button>
  `;

  // Update expand button state
  if (isEditable && S.closingOpen[agentKey]) {
    const btn = pill.querySelector('.pexp');
    if (btn) btn.classList.add('open');
  }

  // Drag events
  pill.addEventListener('dragstart', e => {
    S.drag = { agentKey, idx };
    pill.classList.add('dragging');
    e.dataTransfer.effectAllowed = 'move';
    e.dataTransfer.setData('text/plain', idx);
  });
  pill.addEventListener('dragend', () => {
    pill.classList.remove('dragging');
    clearAllDZHighlights(agentKey);
    S.drag = null;
  });
  pill.addEventListener('dragover', e => { e.preventDefault(); highlightNearestDZ(agentKey, idx); });
  pill.addEventListener('drop', e => { e.preventDefault(); handleDrop(agentKey, idx); });

  return pill;
}

function makeDropZone(agentKey, insertBefore) {
  const dz = document.createElement('div');
  dz.className = 'drop-zone';
  dz.dataset.insertBefore = insertBefore;
  dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('dz-active'); });
  dz.addEventListener('dragleave', () => dz.classList.remove('dz-active'));
  dz.addEventListener('drop', e => {
    e.preventDefault();
    dz.classList.remove('dz-active');
    handleDropAtZone(agentKey, insertBefore);
  });
  return dz;
}

function highlightNearestDZ(agentKey, blockIdx) {
  // Not used heavily; drop zones handle their own highlighting
}

function clearAllDZHighlights(agentKey) {
  const editor = document.getElementById('editor-' + agentKey);
  if (!editor) return;
  editor.querySelectorAll('.drop-zone').forEach(el => el.classList.remove('dz-active'));
}

// ═══════════════════════════════════════════════════
// DRAG AND DROP HANDLING
// ═══════════════════════════════════════════════════
function handleDropAtZone(agentKey, insertBefore) {
  if (!S.drag || S.drag.agentKey !== agentKey) { S.drag = null; return; }
  const fromIdx = S.drag.idx;
  S.drag = null;

  const blocks = S.blocks[agentKey];
  if (fromIdx === insertBefore || fromIdx + 1 === insertBefore) return; // No-op

  const pill = blocks.splice(fromIdx, 1)[0];
  // Adjust insertBefore for the removed element
  const adjustedInsert = insertBefore > fromIdx ? insertBefore - 1 : insertBefore;
  blocks.splice(adjustedInsert, 0, pill);
  mergeAdjacentTextBlocks(agentKey);
  markAgentDirty(agentKey);
  renderBlockEditor(agentKey);
}

function handleDrop(agentKey, targetIdx) {
  if (!S.drag || S.drag.agentKey !== agentKey) { S.drag = null; return; }
  const fromIdx = S.drag.idx;
  if (fromIdx === targetIdx) { S.drag = null; return; }
  S.drag = null;

  const blocks = S.blocks[agentKey];
  const pill = blocks.splice(fromIdx, 1)[0];
  const adjustedTarget = targetIdx > fromIdx ? targetIdx - 1 : targetIdx;
  blocks.splice(adjustedTarget, 0, pill);
  mergeAdjacentTextBlocks(agentKey);
  markAgentDirty(agentKey);
  renderBlockEditor(agentKey);
}

function mergeAdjacentTextBlocks(agentKey) {
  const blocks = S.blocks[agentKey];
  const merged = [];
  blocks.forEach(b => {
    if (b.type === 'text' && merged.length && merged[merged.length-1].type === 'text') {
      merged[merged.length-1].content += b.content;
    } else {
      merged.push({...b});
    }
  });
  S.blocks[agentKey] = merged;
}

// ═══════════════════════════════════════════════════
// PILL OPERATIONS
// ═══════════════════════════════════════════════════
function deletePill(agentKey, idx) {
  const blocks = S.blocks[agentKey];
  const varKey = blocks[idx]?.var;
  if (!varKey) return;

  // If deleting closing_section, close its editor
  if (varKey === 'closing_section') S.closingOpen[agentKey] = false;

  blocks.splice(idx, 1);
  mergeAdjacentTextBlocks(agentKey);
  // Ensure there's at least one text block
  if (blocks.length === 0) blocks.push({ type: 'text', content: '' });
  // Ensure starts and ends with text blocks
  if (blocks[0].type !== 'text') blocks.unshift({ type: 'text', content: '' });
  if (blocks[blocks.length-1].type !== 'text') blocks.push({ type: 'text', content: '' });
  markAgentDirty(agentKey);
  renderBlockEditor(agentKey);
}

function addPillToAgent(agentKey, varKey) {
  const blocks = S.blocks[agentKey];
  // Add pill at end; ensure there's a trailing text block
  if (blocks.length === 0) blocks.push({ type: 'text', content: '' });
  // Insert before the last text block (or at end)
  const lastIdx = blocks.length - 1;
  if (blocks[lastIdx].type === 'text') {
    blocks.splice(lastIdx, 0, { type: 'pill', var: varKey });
  } else {
    blocks.push({ type: 'pill', var: varKey });
    blocks.push({ type: 'text', content: '' });
  }
  markAgentDirty(agentKey);
  renderBlockEditor(agentKey);
  // Scroll to newly added pill
  setTimeout(() => {
    const card = document.getElementById('card-' + agentKey);
    if (card) card.scrollIntoView({ behavior: 'smooth', block: 'end' });
  }, 50);
}

// ═══════════════════════════════════════════════════
// CLOSING SECTION EDITOR
// ═══════════════════════════════════════════════════
function toggleClosing(agentKey) {
  S.closingOpen[agentKey] = !S.closingOpen[agentKey];
  if (!S.closingTab[agentKey]) S.closingTab[agentKey] = 'initial';
  renderBlockEditor(agentKey);
}

function makeClosingEditor(agentKey) {
  const wrap = document.createElement('div');
  wrap.className = 'closing-editor ce-open';
  wrap.id = 'closing-' + agentKey;

  const initKey = Object.keys(S.closingPrompts).find(k => S.closingPrompts[k].variant === 'initial');
  const revKey = Object.keys(S.closingPrompts).find(k => S.closingPrompts[k].variant === 'revision');
  const initContent = initKey ? (S._closingDirty?.[initKey] ?? S.closingPrompts[initKey].content) : '';
  const revContent = revKey ? (S._closingDirty?.[revKey] ?? S.closingPrompts[revKey].content) : '';

  const activeTab = S.closingTab[agentKey] || 'initial';

  wrap.innerHTML = `
    <div class="closing-tabs">
      <div class="ce-tab ${activeTab==='initial'?'active':''}" data-variant="initial" onclick="switchClosingTab('${agentKey}','initial')">📝 初次出題 (Initial)</div>
      <div class="ce-tab ${activeTab==='revision'?'active':''}" data-variant="revision" onclick="switchClosingTab('${agentKey}','revision')">🔄 修改模式 (Revision)</div>
    </div>
    <div class="ce-body ${activeTab==='initial'?'active':''}" id="cetab-${agentKey}-initial">
      <textarea class="ce-textarea" id="cetextarea-${agentKey}-initial" spellcheck="false">${esc(initContent)}</textarea>
      <div class="ce-note">此文本在<strong>首次出題</strong>時作為收尾指令發送到出題員。對應檔案：<code>drafter_user_closing_initial.md</code></div>
    </div>
    <div class="ce-body ${activeTab==='revision'?'active':''}" id="cetab-${agentKey}-revision">
      <textarea class="ce-textarea" id="cetextarea-${agentKey}-revision" spellcheck="false">${esc(revContent)}</textarea>
      <div class="ce-note">此文本在<strong>重寫模式</strong>時發送，其中 <code>{{prev_draft_json}}</code>、<code>{{critique_score}}</code> 等變量在執行時自動替換。對應檔案：<code>drafter_user_closing_revision.md</code></div>
    </div>
  `;

  // Attach input listeners (autoResize on load handled by renderBlockEditor's rAF)
  ['initial','revision'].forEach(variant => {
    const ta = wrap.querySelector(`#cetextarea-${agentKey}-${variant}`);
    if (!ta) return;
    const cKey = variant === 'initial' ? initKey : revKey;
    if (!cKey) return;
    ta.addEventListener('input', () => {
      if (!S._closingDirty) S._closingDirty = {};
      S._closingDirty[cKey] = ta.value;
      S.dirtyClosing[cKey] = true;
      markDirtyStatus();
      autoResize(ta);
    });
  });

  return wrap;
}

function switchClosingTab(agentKey, tab) {
  S.closingTab[agentKey] = tab;
  const closingEl = document.getElementById('closing-' + agentKey);
  if (!closingEl) return;
  closingEl.querySelectorAll('.ce-tab').forEach(el => {
    el.classList.toggle('active', el.dataset.variant === tab);
  });
  ['initial','revision'].forEach(v => {
    const bodyEl = document.getElementById(`cetab-${agentKey}-${v}`);
    if (bodyEl) bodyEl.classList.toggle('active', v === tab);
  });
}

// ═══════════════════════════════════════════════════
// DIRTY TRACKING & SAVE
// ═══════════════════════════════════════════════════
function markAgentDirty(agentKey) {
  S.dirtyAgents[agentKey] = true;
  markDirtyStatus();
}

function markDirtyStatus() {
  const total = Object.keys(S.dirtyAgents).length + Object.keys(S.dirtyClosing).length;
  const el = document.getElementById('saveStatus');
  if (total > 0) {
    el.textContent = `${total} 項未儲存`;
    el.className = 'save-status dirty';
  } else {
    el.textContent = '';
    el.className = 'save-status';
  }
}

async function saveAll() {
  const btn = document.getElementById('saveBtn');
  btn.disabled = true;
  document.getElementById('saveBtnInner').innerHTML = '<span class="spinner"></span> 儲存中...';

  // Collect agent prompts
  const agentPromptsPayload = {};
  Object.keys(S.dirtyAgents).forEach(k => {
    agentPromptsPayload[k] = serializeBlocks(S.blocks[k]);
  });

  // Collect closing prompts
  const closingPromptsPayload = {};
  if (S._closingDirty) {
    Object.keys(S.dirtyClosing).forEach(k => {
      closingPromptsPayload[k] = S._closingDirty[k] ?? S.closingPrompts[k]?.content ?? '';
    });
  }

  try {
    const r = await fetch('/api/save', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ agent_prompts: agentPromptsPayload, closing_prompts: closingPromptsPayload }),
    });
    const d = await r.json();
    if (d.ok) {
      S.dirtyAgents = {};
      S.dirtyClosing = {};
      // Update stored content
      Object.entries(agentPromptsPayload).forEach(([k, v]) => {
        if (S.agentPrompts[k]) S.agentPrompts[k].content = v;
      });
      Object.entries(closingPromptsPayload).forEach(([k, v]) => {
        if (S.closingPrompts[k]) S.closingPrompts[k].content = v;
      });
      markDirtyStatus();
      const el = document.getElementById('saveStatus');
      el.textContent = '已儲存 ✓';
      el.className = 'save-status ok';
      setTimeout(() => { el.textContent=''; el.className='save-status'; }, 3000);
      toast(`已儲存 ${d.saved.length} 個檔案`);
    } else {
      toast('儲存失敗：' + (d.errors||[]).join(', '), true);
    }
  } catch(e) {
    toast('網絡錯誤：' + e.message, true);
  } finally {
    btn.disabled = false;
    document.getElementById('saveBtnInner').textContent = '💾 儲存全部';
  }
}

function resetAll() {
  if (!confirm('放棄所有未儲存的更改？')) return;
  S.dirtyAgents = {};
  S.dirtyClosing = {};
  S._closingDirty = {};
  // Re-parse from original content
  Object.keys(S.agentPrompts).forEach(k => {
    S.blocks[k] = parseTemplate(S.agentPrompts[k].content || '');
    S.closingOpen[k] = false;
  });
  const agentKeys = Object.keys(S.agentPrompts).sort(
    (a,b) => (S.agentPrompts[a].order||99) - (S.agentPrompts[b].order||99)
  );
  renderAllCards(agentKeys);
  markDirtyStatus();
  toast('已重置所有更改');
}

// ═══════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════
function pillIcon(srcType) {
  return { db:'🗄️', editable_prompt:'✏️', file_path:'📁', runtime:'⚙️' }[srcType] || '📌';
}

function autoResize(ta) {
  ta.style.height = 'auto';
  ta.style.height = Math.max(ta.scrollHeight, 24) + 'px';
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function toast(msg, isErr=false) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast' + (isErr ? ' err' : '');
  void el.offsetWidth;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 3200);
}

// Keyboard shortcut
document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 's') { e.preventDefault(); saveAll(); }
});

// Close pill menus on escape
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') document.querySelectorAll('.pill-menu.open').forEach(m => m.classList.remove('open'));
});

boot();
</script>
